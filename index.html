<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard PIBG SK ST. ANNE'S CONVENT</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root{--blue:#08245c;--gold:#f7c948;--green:#21c87a;--red:#ff4d5e;--glass:rgba(255,255,255,.12)}
        *{box-sizing:border-box;margin:0;padding:0;font-family:Poppins,sans-serif}
        body{background:linear-gradient(135deg,#061738,#141850);color:#fff;padding:20px;min-height:100vh}
        
        .header{background:var(--glass);padding:20px;border-radius:20px;border:1px solid #ffffff2b;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center;backdrop-filter:blur(10px)}
        .brand { display: flex; align-items: center; gap: 15px; }
        .logo-img { width: 60px; height: 60px; object-fit: contain; background: white; padding: 5px; border-radius: 10px; }
        .brand h1 { font-size: 20px; text-transform: uppercase; line-height: 1.2; }
        
        .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:15px;margin-bottom:20px}
        .card{background:var(--glass);padding:15px;border-radius:15px;border:1px solid #ffffff2b;text-align:center}
        .value{font-size:22px;font-weight:800;color:var(--gold)}
        
        .layout{display:grid;grid-template-columns: 1.4fr 0.6fr; gap:20px; margin-bottom: 20px;}
        .panel{background:var(--glass);padding:20px;border-radius:20px;border:1px solid #ffffff2b;backdrop-filter:blur(10px)}
        .panel-title{font-weight:800;margin-bottom:15px;color:var(--gold);border-bottom:1px solid #fff2;padding-bottom:10px;display:flex;justify-content:space-between;align-items:center}
        
        .table-wrap{overflow:auto;max-height:500px;border-radius:10px;background:#0002}
        table{width:100%;border-collapse:collapse;font-size:11px}
        th{background:#183a79;padding:12px;position:sticky;top:0;text-align:left;z-index: 10;}
        td{padding:8px;border-bottom:1px solid #ffffff10}
        
        input{background:#ffffff15;color:#fff;border:1px solid #ffffff30;padding:5px;border-radius:5px;width:100%}
        input:focus{outline:none;border-color:var(--gold)}
        
        .status-pill { padding: 3px 8px; border-radius: 10px; font-size: 10px; font-weight: bold; }
        .selesai { background: var(--green); color: #000; }
        .belum { background: var(--red); color: #fff; }
        
        .debtor-item { display: flex; justify-content: space-between; padding: 8px; border-bottom: 1px solid #fff1; font-size: 12px; }
        .badge-red { background: var(--red); padding: 2px 8px; border-radius: 10px; font-size: 11px; }
    </style>
</head>
<body>

<div class="header">
    <div class="brand">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c1/Official_logo_of_the_Malaysian_Ministry_of_Education.svg/1200px-Official_logo_of_the_Malaysian_Ministry_of_Education.svg.png" class="logo-img" alt="Logo Sekolah">
        <div>
            <h1>PIBG SK ST. ANNE'S CONVENT</h1>
            <span id="globalStatus" style="font-size: 12px; opacity: 0.8;">Sistem Sedia</span>
        </div>
    </div>
</div>

<div class="grid">
    <div class="card"><h3>Jumlah Kutipan</h3><div class="value" id="statCollected">RM 0</div></div>
    <div class="card"><h3>PIBG Kakak</h3><div class="value" id="statKakak">RM 0</div></div>
    <div class="card"><h3>Selesai</h3><div class="value" id="statSelesai">0 Murid</div></div>
    <div class="card"><h3>Belum Bayar</h3><div class="value" id="statBelum">0 Murid</div></div>
</div>

<div class="layout">
    <div class="panel">
        <div class="panel-title">
            KEMASKINI BAYARAN
            <div style="display:flex; gap:10px">
                <select id="filterClass" onchange="render()" style="width:120px; background:#222; color:#fff; border-radius:5px; padding:5px;"></select>
                <input type="text" id="searchName" placeholder="Cari nama..." oninput="render()" style="width:150px">
            </div>
        </div>
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>Nama & Kelas</th>
                        <th width="70">PIBG (100)</th>
                        <th width="70">Tamb (70)</th>
                        <th width="70">Kakak (100)</th>
                        <th width="100">Tarikh</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="studentTableBody"></tbody>
            </table>
        </div>
    </div>

    <div class="panel">
        <div class="panel-title">PRESTASI KELAS</div>
        <canvas id="paymentChart" style="max-height: 180px; margin-bottom: 20px;"></canvas>
        <div id="classProgress"></div>
    </div>
</div>

<div class="panel" style="margin-top: 20px;">
    <div class="panel-title">
        SENARAI MURID BELUM BAYAR (RM0) 
        <span class="badge-red" id="debtorCount">0 Orang</span>
    </div>
    <div class="table-wrap" style="max-height: 300px;">
        <div id="debtorListContainer"></div>
    </div>
</div>

<script>
const GOOGLE_SCRIPT_URL = "URL_GOOGLE_SCRIPT_ANDA"; 

const PRELOADED_DATA = {
    "1 Daffodils": ["AAIRA SOPHEA BINTI HAZMEER", "AILEEN SURAIYA BINTI MUHAMMAD NURSYAHMI", "AYRA NADHIRAH BINTI ABDUL RAZAK", "DEANDRA ADELYA BINTI MOHD KAMARUL SHAHID", "DIVYA A/P KUMARAN", "FATHIMA SHAZNA BINTI MANSOOR KHAN", "IZA IZZARA BINTI IZAT IZZUDIN", "KAAVYASREE A/P SASIDARAN", "KHAYLA AFEEYA BINTI RAZMAN FAIZ", "LEYVINIAA JAHYAVIKNES SHAN", "NUR AAFIYAH BINTI MUHAMMAD HAKIIM", "NUR AALIYA ZAHRA BINTI MUHAMMAD MUIZZUDDIN", "NUR AIRIS SOFEA BINTI MOHAMAD YUHANIF", "NUR AISYAH ZAHIRAH BINTI MUHAMMAD AKMAL", "NUR AULIYA SAFFIYAH BINTI MUHAMMAD FITRIASHRAF", "NUR MARISSA BINTI MOHD FITRI", "NUR RAISHA ZAFIRAH BINTI PAHROLRAZI", "NUR ZAHIRA BINTI SYAROLRIZAL", "NUREEN MIKAYLA BINTI RUSDI AZIZ", "NURUL AMIRAH SOFIA BINTI ABDULLAH", "PUTERI BALQIS BINTI KAMALRULZAMAN", "PUTERI QAYRA AFIYA BINTI MOHD AMIRUL ANUAR", "QURRATUL UMNI HANIYYA BINTI MOHD RIDZUAN", "RAJA NELISSA BINTI RAJA HAZREN", "RAPHEALLA MOHAN", "RIZQ RUMAISA BINTI MOHD RIZAL", "RUMAISHA BINTI AB ZILJALALI WALIKRAM", "SAGISHNA A/P DINNAISH", "SHAMITA MOHAN GANES", "SITI NURHAFIZAH BINTI HELMI", "SITI SUHAILA SYAHIRAH BINTI MUHAMAD SAIFULIZAM", "SOFIA NUR AISHAH BINTI MOHD ZAMRIE", "SOFIA NUR ZULAIKHA BINTI MOHD ZAMRIE", "SREESHA NAIR A/P JANATHERAN NAIR", "YUSRIENA DELISHA BINTI MOHAMAD YUSOF", "ZIA AINUL MARDHIAH BINTI MOHD ZAIM"],
    "1 Camellia": ["AFIQAH BINTI HALIDZAN", "AL ZAHRA ROSE BINTI JEFRY", "AZZA ZINNIRAH BINTI MUHAMMAD ZARUL AZUANDI", "DHIA INARA BINTI MUHAMMAD ISHAM", "DHIA SOFEA AZZAHRA BINTI MOHD FAISAL", "DIAN SURFINA BINTI MOHD SAZALI", "HANAN INARA BINTI MOHD SHAHRIN", "HUZAIRAH FARZEEN BINTI MUHAMMAD HASHIM", "JAYASREE A/P SARAVANAN", "KAMAL EYDENE AMEENA BINTI KAMAL ARIFIN", "LENISHA A/P MUKKESH", "MALAIQA HUMAIRA BINTI ZULKIFLI", "MIA ZAREEN QHADIJAH BINTI KHAIRUL BAHARI", "NOR FARISHA NAURA BINTI MUHAMAD NOR FAKHRI", "NUR AATHIFAH MAWIYAH BINTI MOHD AZAHAR", "NUR HIDAYATUL HUSNA BINTI MUHAMMAD FIRDAUS", "NUR IMANI HUMAIRAH BINTI SHAHROL NIZAM", "NUR KHAIRIN AAFIYAH BINTI MUHAMMAD KAMAL", "NUR KHAWLAH ZINNIRAH BINTI HAIRUL RIZUAN", "NUR NAINA AMIRA AMSYAR BINTI UMAR AMSYAR SURESH", "NUR QASEH ELSABELLA BINTI ROSDI", "NUR QASIH MIKAYLA BINTI MOHD EFFENDY", "NUR RAISHA IRDINA BINTI MOHD.RIZUWAN", "NUR ZAFREENAH BINTI AHMAD", "NUR ZARRA SOFEA BINTI MOHD SAIDY", "NURUL AAFIYAH BINTI MUHAMMAD AZMI", "PUTRI NUR AISYAH ZAHRA BINTI MUHAMMAD ZUFPI", "QASEH DELISHA BINTI SYAHRIZAN", "SHAANELLE NAVYAA RAJ", "SITI AISYAH HUMAIRA BINTI MOHD HAIRY", "THIYALINI A/P THIAGU", "ZARYN AEESYA BINTI AMIR AIZAT"]
};

let studentDatabase = [];
let chartInstance = null;

window.onload = async () => {
    Object.keys(PRELOADED_DATA).forEach(kls => {
        PRELOADED_DATA[kls].forEach(nama => {
            studentDatabase.push({
                kelas: kls, nama: nama, pibg: 0, tambahan: 0, kakak: 0, tarikh: "", saving: false
            });
        });
    });

    const sel = document.getElementById('filterClass');
    sel.innerHTML = '<option value="">Semua Kelas</option>' + 
        Object.keys(PRELOADED_DATA).map(k => `<option value="${k}">${k}</option>`).join('');

    await fetchAllData();
    render();
};

async function fetchAllData() {
    document.getElementById('globalStatus').innerText = "⏳ Memuatkan data...";
    try {
        const res = await fetch(GOOGLE_SCRIPT_URL);
        const onlineData = await res.json();
        onlineData.forEach(row => {
            const idx = studentDatabase.findIndex(s => s.nama === row.nama && s.kelas === row.kelas);
            if(idx !== -1) {
                studentDatabase[idx].pibg = Number(row.pibg) || 0;
                studentDatabase[idx].tambahan = Number(row.tambahan) || 0;
                studentDatabase[idx].kakak = Number(row.kakak) || 0;
                studentDatabase[idx].tarikh = row.tarikh || "";
            }
        });
        document.getElementById('globalStatus').innerText = "✅ Data Online Dikemaskini";
    } catch (e) {
        document.getElementById('globalStatus').innerText = "⚠️ Mod Offline";
    }
}

function render() {
    const filterClass = document.getElementById('filterClass').value;
    const searchName = document.getElementById('searchName').value.toLowerCase();
    const tbody = document.getElementById('studentTableBody');
    const debtorList = document.getElementById('debtorListContainer');
    
    tbody.innerHTML = "";
    debtorList.innerHTML = "";

    let stats = { collected: 0, kakak: 0, selesai: 0, belum: 0 };
    let debtors = [];

    studentDatabase.forEach((s, index) => {
        const total = s.pibg + s.tambahan + s.kakak;
        stats.collected += total;
        stats.kakak += s.kakak;

        if (total > 0) stats.selesai++; 
        else {
            stats.belum++;
            debtors.push(s);
        }

        if((!filterClass || s.kelas === filterClass) && (!searchName || s.nama.toLowerCase().includes(searchName))) {
            tbody.innerHTML += `<tr>
                <td><b>${s.nama}</b><br><small>${s.kelas}</small></td>
                <td><input type="number" value="${s.pibg}" onchange="autoSave(${index}, 'pibg', this.value)"></td>
                <td><input type="number" value="${s.tambahan}" onchange="autoSave(${index}, 'tambahan', this.value)"></td>
                <td><input type="number" value="${s.kakak}" onchange="autoSave(${index}, 'kakak', this.value)"></td>
                <td><input type="date" value="${s.tarikh}" onchange="autoSave(${index}, 'tarikh', this.value)"></td>
                <td><span class="status-pill ${total > 0 ? 'selesai' : 'belum'}">${total > 0 ? 'RM'+total : 'BELUM'}</span></td>
            </tr>`;
        }
    });

    // Papar senarai belum bayar
    document.getElementById('debtorCount').innerText = `${debtors.length} Orang`;
    debtors.forEach(d => {
        debtorList.innerHTML += `<div class="debtor-item"><span>${d.nama}</span><b>${d.kelas}</b></div>`;
    });

    document.getElementById('statCollected').innerText = `RM ${stats.collected}`;
    document.getElementById('statKakak').innerText = `RM ${stats.kakak}`;
    document.getElementById('statSelesai').innerText = `${stats.selesai} Murid`;
    document.getElementById('statBelum').innerText = `${stats.belum} Murid`;
    updateChart(stats);
}

async function autoSave(index, field, value) {
    const student = studentDatabase[index];
    student[field] = field === 'tarikh' ? value : Number(value);
    render();
    document.getElementById('globalStatus').innerText = "☁️ Menyimpan...";
    try {
        await fetch(GOOGLE_SCRIPT_URL, {
            method: "POST",
            mode: "no-cors",
            body: JSON.stringify(student)
        });
        document.getElementById('globalStatus').innerText = "✅ Tersimpan";
    } catch (e) {
        document.getElementById('globalStatus').innerText = "❌ Ralat Simpan";
    }
}

function updateChart(stats) {
    const ctx = document.getElementById('paymentChart').getContext('2d');
    if(chartInstance) chartInstance.destroy();
    chartInstance = new Chart(ctx, {
        type: 'doughnut',
        data: {
            labels: ['Membayar', 'Belum Bayar'],
            datasets: [{ data: [stats.selesai, stats.belum], backgroundColor: ['#21c87a', '#ff4d5e'], borderWidth: 0 }]
        },
        options: { plugins: { legend: { position: 'bottom', labels: { color: '#fff' } } } }
    });
}
</script>
</body>
</html>
