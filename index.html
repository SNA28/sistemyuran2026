<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Yuran PIBG SK ST. ANNE'S CONVENT</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root{--blue:#08245c;--gold:#f7c948;--green:#21c87a;--red:#ff4d5e;--glass:rgba(255,255,255,.12)}
        *{box-sizing:border-box;margin:0;padding:0;font-family:Poppins,sans-serif}
        body{background:linear-gradient(135deg,#061738,#141850);color:#fff;padding:20px;min-height:100vh}
        
        .header{background:var(--glass);padding:20px;border-radius:20px;border:1px solid #ffffff2b;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:15px;backdrop-filter:blur(10px)}
        .brand h1 { font-size: 24px; text-transform: uppercase; letter-spacing: 1px; }
        .brand span { color: var(--gold); font-weight: 300; }

        .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:15px;margin-bottom:20px}
        .card{background:var(--glass);padding:20px;border-radius:15px;border:1px solid #ffffff2b;text-align:center;transition:0.3s}
        .card h3{font-size:12px;opacity:0.8;margin-bottom:10px;text-transform:uppercase}
        .value{font-size:28px;font-weight:800;color:var(--gold)}

        .layout{display:grid;grid-template-columns: 1.2fr 0.8fr; gap:20px}
        .panel{background:var(--glass);padding:20px;border-radius:20px;border:1px solid #ffffff2b;backdrop-filter:blur(10px)}
        .panel-title{font-weight:800;margin-bottom:15px;color:var(--gold);display:flex;justify-content:space-between;border-bottom:1px solid #fff2;padding-bottom:10px}

        .table-wrap{overflow:auto;max-height:500px;background:rgba(0,0,0,0.2);border-radius:10px}
        table{width:100%;border-collapse:collapse;font-size:13px}
        th{background:#183a79;padding:12px;text-align:left;position:sticky;top:0;z-index:1}
        td{padding:10px;border-bottom:1px solid #ffffff10}

        input[type="number"], input[type="date"], select, input[type="text"] {
            background: #ffffff15; color: #fff; border: 1px solid #ffffff30; padding: 8px; border-radius: 8px; width: 100%;
        }
        .status-pill { padding: 4px 10px; border-radius: 20px; font-size: 10px; font-weight: bold; text-transform: uppercase; }
        .selesai { background: var(--green); color: #000; }
        .separuh { background: var(--gold); color: #000; }
        .belum { background: var(--red); color: #fff; }

        .btn { padding: 10px 20px; border-radius: 10px; border: 0; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-sync { background: var(--gold); color: #08245c; }
        .btn-sync:hover { transform: scale(1.05); background: #fff; }

        .class-progress { margin-bottom: 15px; background: #fff1; padding: 10px; border-radius: 10px; }
        .bar-bg { height: 8px; background: #fff2; border-radius: 10px; margin-top: 5px; overflow: hidden; }
        .bar-fill { height: 100%; background: var(--green); transition: 0.5s; }

        @media (max-width: 900px) { .layout { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="header">
    <div class="brand">
        <h1>Dashboard PIBG <span>SK ST. ANNE'S CONVENT</span></h1>
        <p id="syncStatus" style="font-size: 11px; opacity: 0.7;">Status: Menunggu arahan...</p>
    </div>
    <div class="actions">
        <button class="btn btn-sync" onclick="syncOnline()">☁️ SIMPAN KE AWAN (SYNC)</button>
    </div>
</div>

<div class="grid">
    <div class="card"><h3>Sasaran Kutipan</h3><div class="value" id="statTarget">RM 0</div></div>
    <div class="card"><h3>Jumlah Terkumpul</h3><div class="value" id="statCollected">RM 0</div></div>
    <div class="card"><h3>Tabung PIBG (RM100)</h3><div class="value" id="statPIBG">RM 0</div></div>
    <div class="card"><h3>Tabung Tambahan (RM70)</h3><div class="value" id="statTambahan">RM 0</div></div>
</div>

<div class="layout">
    <div class="panel">
        <div class="panel-title">MAKLUMAT BAYARAN MURID</div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px;">
            <select id="filterClass" onchange="render()"></select>
            <input type="text" id="searchName" placeholder="Cari nama murid..." oninput="render()">
        </div>
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>Nama</th>
                        <th width="100">PIBG</th>
                        <th width="100">Tambahan</th>
                        <th width="140">Tarikh</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="studentTableBody"></tbody>
            </table>
        </div>
    </div>

    <div class="panel">
        <div class="panel-title">PRESTASI KUTIPAN KELAS</div>
        <div style="max-width: 250px; margin: 0 auto 20px;">
            <canvas id="paymentChart"></canvas>
        </div>
        <div id="classProgressContainer"></div>
    </div>
</div>

<script>
const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyrBOpZ7UiRhHIzbD49djOmeECGQR0FQVhMgzZ8UGL6dT0M9tjJ3O8BaOXsTuUlmlVc/exec";
const PRELOADED_DATA = {
    "1 Daffodils": ["AAIRA SOPHEA BINTI HAZMEER", "AILEEN SURAIYA BINTI MUHAMMAD NURSYAHMI", "AYRA NADHIRAH BINTI ABDUL RAZAK", "DEANDRA ADELYA BINTI MOHD KAMARUL SHAHID", "DIVYA A/P KUMARAN", "FATHIMA SHAZNA BINTI MANSOOR KHAN", "IZA IZZARA BINTI IZAT IZZUDIN", "KAAVYASREE A/P SASIDARAN", "KHAYLA AFEEYA BINTI RAZMAN FAIZ", "LEYVINIAA JAHYAVIKNES SHAN", "NUR AAFIYAH BINTI MUHAMMAD HAKIIM", "NUR AALIYA ZAHRA BINTI MUHAMMAD MUIZZUDDIN", "NUR AIRIS SOFEA BINTI MOHAMAD YUHANIF", "NUR AISYAH ZAHIRAH BINTI MUHAMMAD AKMAL", "NUR AULIYA SAFFIYAH BINTI MUHAMMAD FITRIASHRAF", "NUR MARISSA BINTI MOHD FITRI", "NUR RAISHA ZAFIRAH BINTI PAHROLRAZI", "NUR ZAHIRA BINTI SYAROLRIZAL", "NUREEN MIKAYLA BINTI RUSDI AZIZ", "NURUL AMIRAH SOFIA BINTI ABDULLAH", "PUTERI BALQIS BINTI KAMALRULZAMAN", "PUTERI QAYRA AFIYA BINTI MOHD AMIRUL ANUAR", "QURRATUL UMNI HANIYYA BINTI MOHD RIDZUAN", "RAJA NELISSA BINTI RAJA HAZREN", "RAPHEALLA MOHAN", "RIZQ RUMAISA BINTI MOHD RIZAL", "RUMAISHA BINTI AB ZILJALALI WALIKRAM", "SAGISHNA A/P DINNAISH", "SHAMITA MOHAN GANES", "SITI NURHAFIZAH BINTI HELMI", "SITI SUHAILA SYAHIRAH BINTI MUHAMAD SAIFULIZAM", "SOFIA NUR AISHAH BINTI MOHD ZAMRIE", "SOFIA NUR ZULAIKHA BINTI MOHD ZAMRIE", "SREESHA NAIR A/P JANATHERAN NAIR", "YUSRIENA DELISHA BINTI MOHAMAD YUSOF", "ZIA AINUL MARDHIAH BINTI MOHD ZAIM"],
    "1 Camellia": ["AFIQAH BINTI HALIDZAN", "AL ZAHRA ROSE BINTI JEFRY", "AZZA ZINNIRAH BINTI MUHAMMAD ZARUL AZUANDI", "DHIA INARA BINTI MUHAMMAD ISHAM", "DHIA SOFEA AZZAHRA BINTI MOHD FAISAL", "DIAN SURFINA BINTI MOHD SAZALI", "HANAN INARA BINTI MOHD SHAHRIN", "HUZAIRAH FARZEEN BINTI MUHAMMAD HASHIM", "JAYASREE A/P SARAVANAN", "KAMAL EYDENE AMEENA BINTI KAMAL ARIFIN", "LENISHA A/P MUKKESH", "MALAIQA HUMAIRA BINTI ZULKIFLI", "MIA ZAREEN QHADIJAH BINTI KHAIRUL BAHARI", "NOR FARISHA NAURA BINTI MUHAMAD NOR FAKHRI", "NUR AATHIFAH MAWIYAH BINTI MOHD AZAHAR", "NUR HIDAYATUL HUSNA BINTI MUHAMMAD FIRDAUS", "NUR IMANI HUMAIRAH BINTI SHAHROL NIZAM", "NUR KHAIRIN AAFIYAH BINTI MUHAMMAD KAMAL", "NUR KHAWLAH ZINNIRAH BINTI HAIRUL RIZUAN", "NUR NAINA AMIRA AMSYAR BINTI UMAR AMSYAR SURESH", "NUR QASEH ELSABELLA BINTI ROSDI", "NUR QASIH MIKAYLA BINTI MOHD EFFENDY", "NUR RAISHA IRDINA BINTI MOHD.RIZUWAN", "NUR ZAFREENAH BINTI AHMAD", "NUR ZARRA SOFEA BINTI MOHD SAIDY", "NURUL AAFIYAH BINTI MUHAMMAD AZMI", "PUTRI NUR AISYAH ZAHRA BINTI MUHAMMAD ZUFPI", "QASEH DELISHA BINTI SYAHRIZAN", "SHAANELLE NAVYAA RAJ", "SITI AISYAH HUMAIRA BINTI MOHD HAIRY", "THIYALINI A/P THIAGU", "ZARYN AEESYA BINTI AMIR AIZAT"]
};

let studentDatabase = [];
let chartInstance = null;

// Mulakan sistem
window.onload = async () => {
    setupFilters();
    await loadData();
    render();
};

function setupFilters() {
    const sel = document.getElementById('filterClass');
    sel.innerHTML = '<option value="">Semua Kelas</option>';
    Object.keys(PRELOADED_DATA).forEach(kls => {
        sel.innerHTML += `<option value="${kls}">${kls}</option>`;
    });
}

async function loadData() {
    document.getElementById('syncStatus').innerText = "⏳ Memuatkan data...";
    try {
        const res = await fetch(GOOGLE_SCRIPT_URL);
        const onlineData = await res.json();
        
        // Gabung master list dengan data online
        studentDatabase = [];
        Object.keys(PRELOADED_DATA).forEach(kls => {
            PRELOADED_DATA[kls].forEach(nama => {
                const found = onlineData.find(o => o.nama === nama && o.kelas === kls);
                studentDatabase.push({
                    kelas: kls,
                    nama: nama,
                    pibg: found ? Number(found.pibg) : 0,
                    tambahan: found ? Number(found.tambahan) : 0,
                    tarikh: found ? found.tarikh : ""
                });
            });
        });
        document.getElementById('syncStatus').innerText = "✅ Data Online Dikemaskini";
    } catch (e) {
        document.getElementById('syncStatus').innerText = "⚠️ Mod Offline (Guna Data Sedia Ada)";
        // Jika gagal, guna default RM0
        studentDatabase = [];
        Object.keys(PRELOADED_DATA).forEach(kls => {
            PRELOADED_DATA[kls].forEach(nama => {
                studentDatabase.push({ kelas: kls, nama: nama, pibg: 0, tambahan: 0, tarikh: "" });
            });
        });
    }
}

function render() {
    const filterClass = document.getElementById('filterClass').value;
    const searchName = document.getElementById('searchName').value.toLowerCase();
    const tbody = document.getElementById('studentTableBody');
    tbody.innerHTML = "";

    let stats = { pibg: 0, tambahan: 0, collected: 0, selesai: 0, separuh: 0, belum: 0 };
    let classStats = {};

    studentDatabase.forEach((s, index) => {
        const total = s.pibg + s.tambahan;
        stats.pibg += s.pibg;
        stats.tambahan += s.tambahan;
        stats.collected += total;

        // Kira status
        let statusText = "Belum Bayar", statusClass = "belum";
        if(total >= 170) { statusText = "Selesai"; statusClass = "selesai"; stats.selesai++; }
        else if(total > 0) { statusText = "Separuh"; statusClass = "separuh"; stats.separuh++; }
        else { stats.belum++; }

        // Data prestasi kelas
        if(!classStats[s.kelas]) classStats[s.kelas] = { kutipan: 0, target: 0 };
        classStats[s.kelas].kutipan += total;
        classStats[s.kelas].target += 170;

        // Tapis & Papar
        if((!filterClass || s.kelas === filterClass) && (!searchName || s.nama.toLowerCase().includes(searchName))) {
            tbody.innerHTML += `
                <tr>
                    <td><small>${s.kelas}</small><br><b>${s.nama}</b></td>
                    <td><input type="number" value="${s.pibg}" onchange="updateRecord(${index}, 'pibg', this.value)"></td>
                    <td><input type="number" value="${s.tambahan}" onchange="updateRecord(${index}, 'tambahan', this.value)"></td>
                    <td><input type="date" value="${s.tarikh}" onchange="updateRecord(${index}, 'tarikh', this.value)"></td>
                    <td><span class="status-pill ${statusClass}">${statusText}</span></td>
                </tr>
            `;
        }
    });

    // Update UI Stats
    document.getElementById('statTarget').innerText = `RM ${studentDatabase.length * 170}`;
    document.getElementById('statCollected').innerText = `RM ${stats.collected}`;
    document.getElementById('statPIBG').innerText = `RM ${stats.pibg}`;
    document.getElementById('statTambahan').innerText = `RM ${stats.tambahan}`;

    updateChart(stats);
    renderClassProgress(classStats);
}

function updateRecord(index, field, value) {
    studentDatabase[index][field] = field === 'tarikh' ? value : Number(value);
    render();
}

function renderClassProgress(data) {
    const container = document.getElementById('classProgressContainer');
    container.innerHTML = "";
    Object.keys(data).forEach(kls => {
        const perc = ((data[kls].kutipan / data[kls].target) * 100).toFixed(0);
        container.innerHTML += `
            <div class="class-progress">
                <div style="display:flex; justify-content:space-between; font-size:12px">
                    <span>${kls}</span>
                    <b>RM ${data[kls].kutipan} (${perc}%)</b>
                </div>
                <div class="bar-bg"><div class="bar-fill" style="width: ${perc}%"></div></div>
            </div>
        `;
    });
}

function updateChart(stats) {
    const ctx = document.getElementById('paymentChart').getContext('2d');
    if(chartInstance) chartInstance.destroy();
    chartInstance = new Chart(ctx, {
        type: 'doughnut',
        data: {
            labels: ['Selesai', 'Separuh', 'Belum'],
            datasets: [{
                data: [stats.selesai, stats.separuh, stats.belum],
                backgroundColor: ['#21c87a', '#f7c948', '#ff4d5e'],
                borderWidth: 0
            }]
        },
        options: { plugins: { legend: { position: 'bottom', labels: { color: '#fff' } } } }
    });
}

async function syncOnline() {
    const btn = document.querySelector('.btn-sync');
    btn.innerText = "⏳ SEDANG MENYIMPAN...";
    btn.disabled = true;

    try {
        await fetch(GOOGLE_SCRIPT_URL, {
            method: "POST",
            body: JSON.stringify(studentDatabase)
        });
        alert("✅ Data Berjaya Disimpan ke Google Sheets!");
    } catch (e) {
        alert("❌ Gagal Simpan! Pastikan URL Script Betul.");
    } finally {
        btn.innerText = "☁️ SIMPAN KE AWAN (SYNC)";
        btn.disabled = false;
        document.getElementById('syncStatus').innerText = "✅ Data Terkini";
    }
}
</script>
</body>
</html>
