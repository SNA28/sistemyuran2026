<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem PIBG SK ST. ANNE'S CONVENT</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root{--blue:#08245c;--gold:#f7c948;--green:#21c87a;--red:#ff4d5e;--glass:rgba(255,255,255,.12)}
        *{box-sizing:border-box;margin:0;padding:0;font-family:Poppins,sans-serif}
        body{background:linear-gradient(135deg,#061738,#141850);color:#fff;padding:15px;min-height:100vh}
        
        .header{background:var(--glass);padding:20px;border-radius:20px;border:1px solid #ffffff2b;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center;backdrop-filter:blur(10px)}
        .brand { display: flex; align-items: center; gap: 15px; }
        .logo-img { width: 65px; height: 65px; object-fit: contain; background: white; padding: 5px; border-radius: 12px; border: 2px solid var(--gold); }
        
        .brand h1 { font-size: 16px; text-transform: uppercase; line-height: 1.2; letter-spacing: 1px; }
        .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:20px}
        .card{background:var(--glass);padding:12px;border-radius:15px;border:1px solid #ffffff2b;text-align:center}
        .card h3{font-size: 10px; text-transform: uppercase; opacity: 0.8; margin-bottom: 5px;}
        .value{font-size:18px;font-weight:800;color:var(--gold)}
        
        .layout{display:grid;grid-template-columns: 1.4fr 0.6fr; gap:15px; margin-bottom: 20px;}
        .panel{background:var(--glass);padding:15px;border-radius:20px;border:1px solid #ffffff2b;backdrop-filter:blur(10px)}
        .panel-title{font-weight:800;margin-bottom:15px;color:var(--gold);border-bottom:1px solid #fff2;padding-bottom:10px;display:flex;justify-content:space-between;align-items:center;font-size:14px}
        
        .table-wrap{overflow:auto;max-height:450px;border-radius:10px;background:#0002}
        table{width:100%;border-collapse:collapse;font-size:11px}
        th{background:#183a79;padding:12px;position:sticky;top:0;text-align:left;z-index:10}
        td{padding:8px;border-bottom:1px solid #ffffff10}
        
        input[type="number"], input[type="date"]{background:#ffffff15;color:#fff;border:1px solid #ffffff30;padding:5px;border-radius:5px;width:100%;font-size:11px}
        input:focus{outline:none; border-color:var(--gold)}
        
        .check-container { display: flex; justify-content: center; align-items: center; }
        input[type="checkbox"] { width: 22px; height: 22px; cursor: pointer; accent-color: var(--green); }

        .status-pill { padding: 3px 8px; border-radius: 10px; font-size: 9px; font-weight: bold; }
        .selesai { background: var(--green); color: #000; }
        .belum { background: var(--red); color: #fff; }
        
        .debtor-item { display: flex; justify-content: space-between; padding: 6px; border-bottom: 1px solid #fff1; font-size: 10px; }
        @media (max-width: 850px) { .layout { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="header">
    <div class="brand">
        <img src="images.jpeg" onerror="this.src='https://via.placeholder.com/60?text=LOGO'" class="logo-img">
        <div>
            <h1>PIBG SK ST. ANNE'S CONVENT</h1>
            <span id="globalStatus" style="font-size: 11px; color: var(--green);">Sistem Aktif</span>
        </div>
    </div>
</div>

<div class="grid">
    <div class="card"><h3>Total Kutipan</h3><div class="value" id="statTotalAll">RM 0</div></div>
    <div class="card"><h3>Kls Tambahan (RM70)</h3><div class="value" id="statTotalTambahan">RM 0</div></div>
    <div class="card"><h3>PIBG Kakak (Tick)</h3><div class="value" id="statTotalKakak">0 Murid</div></div>
    <div class="card"><h3>Selesai/Belum</h3><div class="value" id="statCountSummary">0 / 0</div></div>
</div>

<div class="layout">
    <div class="panel">
        <div class="panel-title">
            BORANG KEMASKINI
            <div style="display:flex; gap:5px">
                <select id="filterClass" onchange="render()" style="background:#111; color:#fff; border:1px solid #444; border-radius:5px; padding:3px; font-size:11px;"></select>
                <input type="text" id="searchName" placeholder="Cari nama..." oninput="render()" style="width:100px">
            </div>
        </div>
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>Nama Murid</th>
                        <th width="70">PIBG RM100</th>
                        <th width="60">Pibg Kakak</th>
                        <th width="70">Kls RM70</th>
                        <th width="90">Tarikh</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="studentTableBody"></tbody>
            </table>
        </div>
    </div>

    <div class="panel">
        <div class="panel-title">RINGKASAN STATUS</div>
        <canvas id="paymentChart"></canvas>
        <div id="debtorBox" style="margin-top:20px">
            <p style="font-size:11px; color:var(--gold); margin-bottom:10px"><b>BELUM SELESAI: <span id="debtorCount">0</span></b></p>
            <div class="table-wrap" style="max-height: 220px;" id="debtorListContainer"></div>
        </div>
    </div>
</div>

<script>
const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxok4tRLH8Y1R2b0yBYIdQlxfh-BkTmWHhUsIacKilZp8KnbknZl7WhD7IgB0nw6vwA/exec"; 

// Data Tahun 1 - 6 (Disingkatkan untuk ruang, sila kekalkan data penuh anda)
const PRELOADED_DATA = {
    "1 Daffodils": ["AAIRA SOPHEA BINTI HAZMEER", "AILEEN SURAIYA BINTI MUHAMMAD NURSYAHMI", "AYRA NADHIRAH BINTI ABDUL RAZAK", "DEANDRA ADELYA BINTI MOHD KAMARUL SHAHID", "DIVYA A/P KUMARAN", "FATHIMA SHAZNA BINTI MANSOOR KHAN", "IZA IZZARA BINTI IZAT IZZUDIN", "KAAVYASREE A/P SASIDARAN", "KHAYLA AFEEYA BINTI RAZMAN FAIZ", "LEYVINIAA JAHYAVIKNES SHAN", "NUR AAFIYAH BINTI MUHAMMAD HAKIIM", "NUR AALIYA ZAHRA BINTI MUHAMMAD MUIZZUDDIN", "NUR AIRIS SOFEA BINTI MOHAMAD YUHANIF", "NUR AISYAH ZAHIRAH BINTI MUHAMMAD AKMAL", "NUR AULIYA SAFFIYAH BINTI MUHAMMAD FITRIASHRAF", "NUR MARISSA BINTI MOHD FITRI", "NUR RAISHA ZAFIRAH BINTI PAHROLRAZI", "NUR ZAHIRA BINTI SYAROLRIZAL", "NUREEN MIKAYLA BINTI RUSDI AZIZ", "NURUL AMIRAH SOFIA BINTI ABDULLAH", "PUTERI BALQIS BINTI KAMALRULZAMAN", "PUTERI QAYRA AFIYA BINTI MOHD AMIRUL ANUAR", "QURRATUL UMNI HANIYYA BINTI MOHD RIDZUAN", "RAJA NELISSA BINTI RAJA HAZREN", "RAPHEALLA MOHAN", "RIZQ RUMAISA BINTI MOHD RIZAL", "RUMAISHA BINTI AB ZILJALALI WALIKRAM", "SAGISHNA A/P DINNAISH", "SHAMITA MOHAN GANES", "SITI NURHAFIZAH BINTI HELMI", "SITI SUHAILA SYAHIRAH BINTI MUHAMAD SAIFULIZAM", "SOFIA NUR AISHAH BINTI MOHD ZAMRIE", "SOFIA NUR ZULAIKHA BINTI MOHD ZAMRIE", "SREESHA NAIR A/P JANATHERAN NAIR", "YUSRIENA DELISHA BINTI MOHAMAD YUSOF", "ZIA AINUL MARDHIAH BINTI MOHD ZAIM"],
    "1 Camellia": ["AFIQAH BINTI HALIDZAN", "AL ZAHRA ROSE BINTI JEFRY", "AZZA ZINNIRAH BINTI MUHAMMAD ZARUL AZUANDI", "DHIA INARA BINTI MUHAMMAD ISHAM", "DHIA SOFEA AZZAHRA BINTI MOHD FAISAL", "DIAN SURFINA BINTI MOHD SAZALI", "HANAN INARA BINTI MOHD SHAHRIN", "HUZAIRAH FARZEEN BINTI MUHAMMAD HASHIM", "JAYASREE A/P SARAVANAN", "KAMAL EYDENE AMEENA BINTI KAMAL ARIFIN", "LENISHA A/P MUKKESH", "MALAIQA HUMAIRA BINTI ZULKIFLI", "MIA ZAREEN QHADIJAH BINTI KHAIRUL BAHARI", "NOR FARISHA NAURA BINTI MUHAMAD NOR FAKHRI", "NUR AATHIFAH MAWIYAH BINTI MOHD AZAHAR", "NUR HIDAYATUL HUSNA BINTI MUHAMMAD FIRDAUS", "NUR IMANI HUMAIRAH BINTI SHAHROL NIZAM", "NUR KHAIRIN AAFIYAH BINTI MUHAMMAD KAMAL", "NUR KHAWLAH ZINNIRAH BINTI HAIRUL RIZUAN", "NUR NAINA AMIRA AMSYAR BINTI UMAR AMSYAR SURESH", "NUR QASEH ELSABELLA BINTI ROSDI", "NUR QASIH MIKAYLA BINTI MOHD EFFENDY", "NUR RAISHA IRDINA BINTI MOHD.RIZUWAN", "NUR ZAFREENAH BINTI AHMAD", "NUR ZARRA SOFEA BINTI MOHD SAIDY", "NURUL AAFIYAH BINTI MUHAMMAD AZMI", "PUTRI NUR AISYAH ZAHRA BINTI MUHAMMAD ZUFPI", "QASEH DELISHA BINTI SYAHRIZAN", "SHAANELLE NAVYAA RAJ", "SITI AISYAH HUMAIRA BINTI MOHD HAIRY", "THIYALINI A/P THIAGU", "ZARYN AEESYA BINTI AMIR AIZAT"]
    // ... Tambah data kelas lain jika perlu di sini
};

let studentDatabase = [];
let chartInstance = null;

function initLocalDatabase() {
    studentDatabase = [];
    Object.keys(PRELOADED_DATA).forEach(kls => {
        PRELOADED_DATA[kls].forEach(nama => {
            studentDatabase.push({ kelas: kls, nama: nama, pibg: 0, tambahan: 0, kakak: 0, tarikh: "" });
        });
    });
}

window.onload = async () => {
    initLocalDatabase();
    const sel = document.getElementById('filterClass');
    sel.innerHTML = '<option value="">Semua Kelas</option>' + Object.keys(PRELOADED_DATA).map(k => `<option value="${k}">${k}</option>`).join('');
    render();
    await fetchAllData();
};

async function fetchAllData() {
    try {
        const res = await fetch(GOOGLE_SCRIPT_URL);
        const onlineData = await res.json();
        onlineData.forEach(row => {
            const idx = studentDatabase.findIndex(s => s.nama === row.nama && s.kelas === row.kelas);
            if(idx !== -1) {
                studentDatabase[idx].pibg = Number(row.pibg) || 0;
                studentDatabase[idx].tambahan = Number(row.tambahan) || 0;
                studentDatabase[idx].kakak = Number(row.kakak) || 0;
                studentDatabase[idx].tarikh = row.tarikh || "";
            }
        });
        document.getElementById('globalStatus').innerText = "✅ Cloud Berhubung";
        render();
    } catch (e) {
        document.getElementById('globalStatus').innerText = "⚠️ Mod Offline";
    }
}

function render() {
    const filterClass = document.getElementById('filterClass').value;
    const searchName = document.getElementById('searchName').value.toLowerCase();
    const tbody = document.getElementById('studentTableBody');
    const debtorList = document.getElementById('debtorListContainer');
    
    tbody.innerHTML = "";
    debtorList.innerHTML = "";
    let totals = { all: 0, pibg: 0, kakakCount: 0, tambahan: 0, selesai: 0, belum: 0 };
    let debtors = [];

    studentDatabase.forEach((s, index) => {
        // Logik Selesai: Jika bayar PIBG > 0 ATAU Bayar Tambahan > 0 ATAU Tick Kakak (nilai 1)
        const isSelesai = (s.pibg > 0) || (s.tambahan > 0) || (s.kakak === 1);

        totals.all += (s.pibg + s.tambahan);
        totals.tambahan += s.tambahan;
        if(s.kakak === 1) totals.kakakCount++;

        if (isSelesai) {
            totals.selesai++;
        } else {
            totals.belum++;
            debtors.push(s);
        }

        if((!filterClass || s.kelas === filterClass) && (!searchName || s.nama.toLowerCase().includes(searchName))) {
            tbody.innerHTML += `<tr>
                <td><b>${s.nama}</b><br><small>${s.kelas}</small></td>
                <td><input type="number" value="${s.pibg || ''}" placeholder="0" onchange="autoSave(${index}, 'pibg', this.value)"></td>
                <td class="check-container">
                    <input type="checkbox" ${s.kakak === 1 ? 'checked' : ''} onchange="toggleKakak(${index}, this.checked)">
                </td>
                <td><input type="number" value="${s.tambahan || ''}" placeholder="0" onchange="autoSave(${index}, 'tambahan', this.value)"></td>
                <td><input type="date" value="${s.tarikh}" onchange="autoSave(${index}, 'tarikh', this.value)"></td>
                <td><span class="status-pill ${isSelesai ? 'selesai' : 'belum'}">${isSelesai ? 'SELESAI' : 'BELUM'}</span></td>
            </tr>`;
        }
    });

    document.getElementById('statTotalAll').innerText = "RM " + totals.all;
    document.getElementById('statTotalKakak').innerText = totals.kakakCount + " Murid";
    document.getElementById('statTotalTambahan').innerText = "RM " + totals.tambahan;
    document.getElementById('statCountSummary').innerText = `${totals.selesai} / ${totals.belum}`;
    document.getElementById('debtorCount').innerText = debtors.length;
    
    debtors.forEach(d => {
        debtorList.innerHTML += `<div class="debtor-item"><span>${d.nama}</span><b>${d.kelas}</b></div>`;
    });
    updateChart(totals);
}

function toggleKakak(index, isChecked) {
    const val = isChecked ? 1 : 0;
    studentDatabase[index].kakak = val; // Kemaskini lokal dulu
    autoSave(index, 'kakak', val);
}

async function autoSave(index, field, value) {
    const student = studentDatabase[index];
    student[field] = field === 'tarikh' ? value : Number(value);
    render(); // Update UI serta-merta
    
    document.getElementById('globalStatus').innerText = "☁️ Menyimpan...";
    try {
        await fetch(GOOGLE_SCRIPT_URL, {
            method: "POST",
            mode: "no-cors",
            body: JSON.stringify(student)
        });
        document.getElementById('globalStatus').innerText = "✅ Tersimpan";
    } catch (e) {
        document.getElementById('globalStatus').innerText = "❌ Ralat Simpan";
    }
}

function updateChart(totals) {
    const ctx = document.getElementById('paymentChart').getContext('2d');
    if(chartInstance) chartInstance.destroy();
    chartInstance = new Chart(ctx, {
        type: 'doughnut',
        data: {
            labels: ['Selesai', 'Belum'],
            datasets: [{ data: [totals.selesai, totals.belum], backgroundColor: ['#21c87a', '#ff4d5e'], borderWidth: 0 }]
        },
        options: { 
            responsive: true,
            plugins: { legend: { position: 'bottom', labels: { color: '#fff', font: { size: 10 } } } } 
        }
    });
}
</script>
</body>
</html>
